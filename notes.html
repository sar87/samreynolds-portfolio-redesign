<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — Sam Reynolds</title>
<meta name="description" content="Short, dated notes on AI, conservation and ecology — announcements, quick thoughts and work in progress.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--void:#070d09;--pine:#0c1510;--pine-2:#0e1a12;--glow:#63f2a2;--glow-dim:#3a9c68;--amber:#ffb454;--fog:#b7cdbd;--fog-dim:#6d8474;--line:rgba(99,242,162,0.14);--display:"Bricolage Grotesque",sans-serif;--mono:"IBM Plex Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--fog);font-family:var(--display);font-weight:300;line-height:1.65;-webkit-font-smoothing:antialiased;}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 90% 70% at 50% 0%,rgba(99,242,162,0.05),transparent 60%);}
.nav{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:1.2rem 2.2rem;background:rgba(7,13,9,0.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.nav .mark{color:#eaf5ec;text-decoration:none;font-weight:500;font-size:1rem;letter-spacing:-0.01em;}
.nav .mark span{color:var(--glow);}
.nav .back{font-family:var(--mono);font-size:0.75rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--glow-dim);text-decoration:none;}
.nav .back:hover{color:var(--glow);}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:4.5rem 2.2rem 6rem;}
.sec-head{display:flex;align-items:center;gap:1.1rem;margin-bottom:1rem;}
.sec-head .tag{font-family:var(--mono);font-size:0.72rem;color:var(--glow-dim);border:1px solid var(--line);border-radius:3px;padding:0.2rem 0.55rem;}
.sec-head h1{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:600;letter-spacing:-0.02em;color:#eaf5ec;line-height:1.05;}
.lede{font-size:1.1rem;color:var(--fog);max-width:56ch;margin-bottom:3.2rem;}
/* ---- list view ---- */
.note-item{display:grid;grid-template-columns:9.5rem 1fr;gap:1.4rem;padding:1.3rem 0;border-bottom:1px solid var(--line);align-items:baseline;}
.note-item .d{font-family:var(--mono);font-size:0.78rem;letter-spacing:0.08em;color:var(--fog-dim);}
.note-item h2{font-size:1.3rem;font-weight:500;letter-spacing:-0.01em;line-height:1.3;}
.note-item h2 a{color:#eaf5ec;text-decoration:none;}
.note-item h2 a:hover{color:var(--glow);}
.note-item .ex{margin-top:0.35rem;font-size:0.98rem;color:var(--fog-dim);max-width:60ch;}
.tags{display:inline-flex;flex-wrap:wrap;gap:0.45rem;margin-top:0.55rem;}
.tags span{font-family:var(--mono);font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--glow-dim);border:1px solid var(--line);border-radius:99px;padding:0.14rem 0.6rem;}
/* ---- single note view ---- */
.note-full .d{font-family:var(--mono);font-size:0.78rem;letter-spacing:0.1em;color:var(--fog-dim);}
.note-full h1{font-size:clamp(1.9rem,4vw,2.8rem);font-weight:600;letter-spacing:-0.02em;color:#eaf5ec;line-height:1.15;margin:0.5rem 0 0.9rem;}
.note-body{margin-top:2rem;font-size:1.13rem;line-height:1.75;}
.note-body p+p,.note-body p+ul,.note-body ul+p{margin-top:1.2rem;}
.note-body a{color:var(--glow);text-decoration:none;border-bottom:1px solid rgba(99,242,162,0.35);}
.note-body a:hover{border-bottom-color:var(--glow);}
.note-body h2,.note-body h3{color:#eaf5ec;font-weight:600;margin:2rem 0 0.8rem;letter-spacing:-0.01em;}
.note-body ul,.note-body ol{padding-left:1.3rem;}
.note-body li+li{margin-top:0.4rem;}
.note-body blockquote{border-left:2px solid var(--glow-dim);padding-left:1.1rem;color:var(--fog-dim);margin:1.4rem 0;}
.note-body code{font-family:var(--mono);font-size:0.88em;background:var(--pine-2);border:1px solid var(--line);border-radius:3px;padding:0.1em 0.35em;}
.note-body pre{background:var(--pine-2);border:1px solid var(--line);border-radius:6px;padding:1.1rem 1.3rem;overflow-x:auto;margin:1.4rem 0;}
.note-body pre code{background:none;border:none;padding:0;}
.note-body img{max-width:100%;border-radius:6px;margin:1.4rem 0;}
.all-link{display:inline-block;margin-bottom:2.6rem;font-family:var(--mono);font-size:0.75rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--glow-dim);text-decoration:none;}
.all-link:hover{color:var(--glow);}
.empty{font-family:var(--mono);font-size:0.85rem;color:var(--fog-dim);padding:3rem 0;}
@media(max-width:640px){.note-item{grid-template-columns:1fr;gap:0.25rem;}}
</style>
</head>
<body>
<nav class="nav">
  <a class="mark" href="/">Sam Reynolds<span>.</span></a>
  <a class="back" href="/">← Back to site</a>
</nav>
<main class="wrap" id="app"><p class="empty">Loading notes…</p></main>

<script type="module">
const app = document.getElementById("app");
const esc = s => s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const fmt = d => new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
const tagHtml = tags => tags.length ? `<span class="tags">${tags.map(t => `<span>${esc(t)}</span>`).join("")}</span>` : "";

let notes = [];
try {
  notes = (await fetch("/data/notes.json").then(r => r.json())).notes;
} catch {
  app.innerHTML = `<p class="empty">Couldn't load notes.</p>`;
}

function renderList() {
  document.title = "Notes — Sam Reynolds";
  app.innerHTML = `
    <div class="sec-head"><span class="tag">✳</span><h1>Notes</h1></div>
    <p class="lede">Short, dated entries — announcements, quick thoughts, links and work in progress. Longer-form work lives under publications and talks.</p>
    ${notes.length ? notes.map(n => `
      <article class="note-item">
        <span class="d">${fmt(n.date)}</span>
        <div>
          <h2><a href="#${esc(n.slug)}">${esc(n.title)}</a></h2>
          ${n.excerpt ? `<p class="ex">${esc(n.excerpt)}</p>` : ""}
          ${tagHtml(n.tags)}
        </div>
      </article>`).join("") : `<p class="empty">No notes yet.</p>`}`;
}

function renderNote(n) {
  document.title = `${n.title} — Notes — Sam Reynolds`;
  app.innerHTML = `
    <a class="all-link" href="#">← All notes</a>
    <article class="note-full">
      <span class="d">${fmt(n.date)}</span>
      <h1>${esc(n.title)}</h1>
      ${tagHtml(n.tags)}
      <div class="note-body">${n.html}</div>
    </article>`;
}

function route() {
  const slug = decodeURIComponent(location.hash.slice(1));
  const n = slug && notes.find(x => x.slug === slug);
  if (n) { renderNote(n); } else { renderList(); }
  scrollTo(0, 0);
}
addEventListener("hashchange", route);
if (notes.length || true) route();
</script>
</body>
</html>
